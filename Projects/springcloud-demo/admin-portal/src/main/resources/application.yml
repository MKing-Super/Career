server:
  port: 9010
  session:
    timeout: 2h

spring:
  application:
    name: admin-portal
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  redis:
    cluster:
      nodes: 10.100.210.165:7001,10.100.210.165:7002,10.100.210.165:7003,10.100.210.166:7001,10.100.210.166:7002,10.100.210.166:7003

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9100/eureka/

logging:
  file:
    name: D:/mk-logs/admin-portal.log
  level:
    root: INFO
