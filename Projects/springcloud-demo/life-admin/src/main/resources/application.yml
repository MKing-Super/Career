server:
  port: 9004

spring:
  application:
    name: life-admin
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

logging:
  file:
    name: D:/mk-logs/life-admin.log
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9100/eureka/